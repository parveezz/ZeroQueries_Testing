<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partners | ZeroQueries</title>
    <meta name="description" content="Join the ZeroQueries Partner Network. Empower your clients to query databases using natural language securely and accelerate decision-making." />
    <meta name="keywords" content="ZeroQueries Partner Network, consulting partners, software integrators, data intelligence partnership" />
    <meta name="author" content="ZeroQueries Inc." />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zeroqueries.com/partners.html" />
    <meta property="og:title" content="Partners | ZeroQueries" />
    <meta property="og:description" content="Join the ZeroQueries Partner Network. Empower your clients to query databases using natural language securely." />
    <meta property="og:image" content="https://zeroqueries.com/Home/ZQ_icon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zeroqueries.com/partners.html" />
    <meta property="twitter:title" content="Partners | ZeroQueries" />
    <meta property="twitter:description" content="Join the ZeroQueries Partner Network. Empower your clients to query databases using natural language securely." />
    <meta property="twitter:image" content="https://zeroqueries.com/Home/ZQ_icon.png" />

    <link rel="canonical" href="https://zeroqueries.com/partners.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    </noscript>

    <link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased font-sans min-h-screen flex flex-col justify-between pt-28 bg-[#030014]">
    <div class="mesh-glow"></div>

    <!-- Header / Navbar Replica -->
    <nav class="fixed top-0 w-full z-[100] px-4 sm:px-6">
      <div class="max-w-7xl mx-auto glass rounded-[2rem] px-4 sm:px-8 py-2 h-16 mt-2 flex justify-between items-center transition-all duration-500 hover:border-white/20">
        <a href="/" class="flex items-center gap-2 group cursor-pointer">
          <img
            src="/Home/ZQ_APP_icon.png"
            alt="ZQ Protocol"
            class="w-24 h-auto group-hover:scale-110 transition-transform duration-300"
          />
          <span
            class="text-[22px] font-extrabold tracking-wide hidden sm:block 
            bg-gradient-to-r from-white via-slate-200 to-slate-400 
            bg-clip-text text-transparent 
            group-hover:from-white group-hover:to-white 
            transition-all duration-300"
          >
            ZeroQueries
          </span>
        </a>

        <!-- Desktop Navbar Links -->
        <div class="hidden lg:flex items-center gap-8">
          <div class="flex gap-8 text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]" id="navLinks">
            <a href="/#features" class="hover:text-white transition-colors" id="navProduct">Features</a>
            <a href="/#solution" class="hover:text-white transition-colors" id="navSolutions">Solution</a>
            <a href="/#pricing" class="hover:text-white transition-colors" id="navPricing">Pricing</a>
            <a href="/partners.html" class="hover:text-white transition-colors" id="navPartners">Partners</a>
          </div>
          <div class="h-4 w-px bg-white/10"></div>
          <div class="flex items-center gap-6">
            <button
              onclick="toggleLang()"
              class="flex items-center gap-2 text-[11px] font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-[0.2em]"
            >
              <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20M2 12h20"/>
              </svg>
              <span id="langText">عربي</span>
            </button>
            <a href="https://chat.zeroqueries.com">
              <button
                class="text-[11px] font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-[0.2em]"
                id="navSignIn"
              >
                Sign In
              </button>
            </a>
            <a href="/#demo">
              <button
                class="bg-white text-black px-6 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest hover:bg-slate-100 transition-all hover:scale-105"
                id="navDemo"
              >
                Request a Demo
              </button>
            </a>
          </div>
        </div>

        <!-- Mobile Navbar controls -->
        <div class="lg:hidden flex items-center gap-4">
          <button
            onclick="toggleLang()"
            class="text-slate-400 hover:text-white transition-colors"
            aria-label="Switch Language"
          >
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20M2 12h20"/>
            </svg>
          </button>
          <a href="/#demo" class="text-white p-2" aria-label="Request a Demo">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-4xl mx-auto px-6 py-20 relative z-10 flex-1 flex flex-col items-center justify-center text-center animate-reveal">
      <div class="w-20 h-20 bg-indigo-600/10 border border-indigo-500/20 rounded-3xl flex items-center justify-center text-indigo-400 mb-8 animate-float">
        <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </div>

      <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 tracking-tighter" id="title">
        ZeroQueries Partners Page
      </h1>
      
      <p class="text-lg md:text-xl text-slate-400 max-w-xl leading-relaxed mb-8 font-light" id="subtitle">
        This is a placeholder page for the partner network. You can customize this layout inside the file public/partners.html.
      </p>

      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <a href="/" class="btn-premium px-8 py-3.5 rounded-full font-black uppercase tracking-widest text-xs" id="ctaBtn">
          Explore Platform
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 text-center text-xs text-slate-600 border-t border-white/5 relative z-10">
      <div class="max-w-7xl mx-auto px-6" id="footerText">
        &copy; 2024 ZeroQueries Inc. All rights reserved.
      </div>
    </footer>

    <!-- Script to set translation based on localStorage -->
    <script>
      function toggleLang() {
        const currentLang = localStorage.getItem('lang') || 'en';
        const newLang = currentLang === 'en' ? 'ar' : 'en';
        localStorage.setItem('lang', newLang);
        window.location.reload();
      }

      const lang = localStorage.getItem('lang') || 'en';
      
      const translations = {
        en: {
          title: "ZeroQueries Partners Page",
          subtitle: "This is a placeholder page for the partner network. You can customize this layout inside the file public/partners.html.",
          homeBtn: "Back to Home",
          ctaBtn: "Explore Platform",
          footerText: "&copy; 2024 ZeroQueries Inc. All rights reserved.",
          langText: "عربي",
          navProduct: "Features",
          navSolutions: "Solution",
          navPricing: "Pricing",
          navPartners: "Partners",
          navSignIn: "Sign In",
          navDemo: "Request a Demo"
        },
        ar: {
          title: "صفحة شركاء ZeroQueries",
          subtitle: "هذه صفحة تجريبية مؤقتة لشبكة الشركاء. يمكنك تخصيص هذا التصميم داخل الملف public/partners.html.",
          homeBtn: "العودة للرئيسية",
          ctaBtn: "استكشف المنصة",
          footerText: "&copy; 2024 ZeroQueries Inc. جميع الحقوق محفوظة.",
          langText: "English",
          navProduct: "الميزات",
          navSolutions: "الحلول",
          navPricing: "الأسعار",
          navPartners: "الشركاء",
          navSignIn: "تسجيل الدخول",
          navDemo: "طلب عرض توضيحي"
        }
      };

      const t = translations[lang] || translations.en;

      // Apply texts
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('ctaBtn').textContent = t.ctaBtn;
      document.getElementById('footerText').innerHTML = t.footerText;
      document.getElementById('langText').textContent = t.langText;
      document.getElementById('navProduct').textContent = t.navProduct;
      document.getElementById('navSolutions').textContent = t.navSolutions;
      document.getElementById('navPricing').textContent = t.navPricing;
      document.getElementById('navPartners').textContent = t.navPartners;
      document.getElementById('navSignIn').textContent = t.navSignIn;
      document.getElementById('navDemo').textContent = t.navDemo;

      // Apply page attributes
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      if (lang === 'ar') {
        document.body.classList.remove('font-sans');
        document.body.classList.add('font-arabic');
        // Reverse nav flex order for RTL matching
        document.getElementById('navLinks').classList.add('flex-row-reverse');
      }
    </script>
</body>
</html>
